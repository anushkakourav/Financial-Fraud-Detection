<!DOCTYPE html>
<html>
<head>

    <title>Fraud Detection Login</title>

    <style>

        body{
            font-family: Arial;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:#1e293b;
            padding:40px;
            border-radius:10px;
            width:320px;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:none;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            background:#22c55e;
            border:none;
            border-radius:5px;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#16a34a;
        }

        a{
            color:#60a5fa;
            text-decoration:none;
        }

        .link{
            text-align:center;
            margin-top:10px;
        }

    </style>

</head>


<body>

<div class="login-box">

    <h2>Fraud Detection System</h2>

    <form method="POST">

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <div class="link">
        Don't have account?  
        <a href="/signup">Signup</a>
    </div>

</div>

</body>
</html>
